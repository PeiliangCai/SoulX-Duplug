seed: 1337
device: cuda
output_dir: ${OUTPUT_ROOT}/stage1_aishell_tiny_cuda

audio:
  target_sample_rate: 16000

tokenizer:
  backend: dummy
  vocab_size: 256
  token_rate_hz: 12.5

model:
  backend: dummy
  hidden_size: 128

data:
  train_manifest: manifests/aishell_tiny/stage1/train.normalized.jsonl
  dev_manifest: manifests/aishell_tiny/stage1/dev.normalized.jsonl
  max_audio_tokens: 1024
  max_text_tokens: 256

training:
  batch_size: 4
  eval_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 0.0003
  weight_decay: 0.01
  max_steps: 5
  log_every: 1
  eval_every: 5
  save_every: 5
  max_new_tokens: 128
