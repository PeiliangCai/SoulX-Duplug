seed: 1337
device: cuda
output_dir: ${OUTPUT_ROOT}/stage2_aishell_paper_smoke
stage1_checkpoint: ${OUTPUT_ROOT}/stage1_aishell_paper_smoke/checkpoints/latest

audio:
  target_sample_rate: 16000
  chunk_seconds: 0.16
  lookback_seconds: 0.96
  lookahead_seconds: 0.04

tokenizer:
  backend: glm4voice
  model_path: ${MODEL_ROOT}/glm-4-voice-tokenizer
  code_path: ${MODEL_ROOT}/GLM-4-Voice
  vocab_size: 16384
  dtype: bfloat16

model:
  backend: qwen
  model_name_or_path: ${MODEL_ROOT}/Qwen3-0.6B

data:
  train_manifest: manifests/stage2_aishell_smoke/train.jsonl
  dev_manifest: manifests/stage2_aishell_smoke/dev.jsonl
  limit_train_samples: 8
  limit_dev_samples: 2
  max_sequence_length: 1024

training:
  batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.00002
  weight_decay: 0.01
  max_steps: 5
  log_every: 1
  eval_every: 5
  save_every: 5
