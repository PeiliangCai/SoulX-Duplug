name: paper_en
dedup: source_text
target_hours:
  en: 31000

datasets:
  - id: librispeech
    lang: en
    download:
      source_dataset: librispeech
      files: all
      dedup_key: openslr:slr12:librispeech
  - id: gigaspeech
    lang: en
    subset: XL
    download:
      source_dataset: gigaspeech
      hf_include:
        - "(?i)(XL|GigaSpeech\\.json|metadata)"
      dedup_key: hf:speechcolab/gigaspeech:xl
  - id: commonvoice-en
    lang: en
    provider: voxbox
    download:
      source_dataset: commonvoice-en
      dedup_key: voxbox:commonvoice:en
  - id: emilia-en
    lang: en
    provider: voxbox
    download:
      source_dataset: voxbox
      hf_prefix:
        - "audios/emilia_en/"
        - "metadata/"
      hf_include:
        - "(?i)(^audios/emilia_en/|^metadata/emilia_en\\.jsonl$)"
      dedup_key: voxbox:emilia:en
