name: paper_all
dedup: source_text
target_hours:
  zh: 47000
  en: 31000

datasets:
  - id: aishell1
    lang: zh
    download:
      source_dataset: aishell1
      files: all
      dedup_key: openslr:slr33:aishell1
  - id: aishell3
    lang: zh
    download:
      source_dataset: aishell3
      files: all
      dedup_key: openslr:slr93:aishell3
  - id: wenetspeech
    lang: zh
    download:
      source_dataset: wenetspeech
      dedup_key: wenetspeech:official
  - id: magicdata
    lang: zh
    download:
      source_dataset: magicdata
      files: all
      dedup_key: openslr:slr68:magicdata
  - id: commonvoice-cn
    lang: zh
    provider: voxbox
    download:
      source_dataset: commonvoice-cn
      dedup_key: voxbox:commonvoice:zh
  - id: emilia-cn
    lang: zh
    provider: voxbox
    download:
      source_dataset: voxbox
      hf_prefix:
        - "audios/emilia_zh/"
        - "metadata/"
      hf_include:
        - "(?i)(^audios/emilia_zh/|^metadata/emilia_zh\\.jsonl$)"
      dedup_key: voxbox:emilia:zh
  - id: librispeech
    lang: en
    download:
      source_dataset: librispeech
      files: all
      dedup_key: openslr:slr12:librispeech
  - id: gigaspeech
    lang: en
    subset: XL
    download:
      source_dataset: gigaspeech
      hf_include:
        - "(?i)(XL|GigaSpeech\\.json|metadata)"
      dedup_key: hf:speechcolab/gigaspeech:xl
  - id: commonvoice-en
    lang: en
    provider: voxbox
    download:
      source_dataset: commonvoice-en
      dedup_key: voxbox:commonvoice:en
  - id: emilia-en
    lang: en
    provider: voxbox
    download:
      source_dataset: voxbox
      hf_prefix:
        - "audios/emilia_en/"
        - "metadata/"
      hf_include:
        - "(?i)(^audios/emilia_en/|^metadata/emilia_en\\.jsonl$)"
      dedup_key: voxbox:emilia:en
