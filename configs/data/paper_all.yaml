name: paper_all
dedup: source_text

datasets:
  - id: aishell1
    lang: zh
    download:
      source_dataset: aishell1
      files: all
      dedup_key: openslr:slr33:aishell1
  - id: aishell3
    lang: zh
    download:
      source_dataset: aishell3
      files: all
      dedup_key: openslr:slr93:aishell3
  - id: wenetspeech
    lang: zh
    download:
      source_dataset: wenetspeech
      dedup_key: manual:wenetspeech
  - id: magicdata
    lang: zh
    download:
      source_dataset: magicdata
      files: all
      dedup_key: openslr:slr68:magicdata
  - id: commonvoice-cn
    enabled: false
    lang: zh
    provider: voxbox
    download:
      source_dataset: voxbox
      hf_include:
        - "(?i)(commonvoice|common_voice|cv).*(zh|cn|chinese|mandarin)"
      dedup_key: voxbox:commonvoice:zh
      fallback:
        source_dataset: commonvoice-cn
  - id: emilia-cn
    enabled: false
    lang: zh
    provider: voxbox
    download:
      source_dataset: voxbox
      hf_include:
        - "(?i)(emilia).*(zh|cn|chinese|mandarin)"
      dedup_key: voxbox:emilia:zh
      fallback:
        source_dataset: emilia-cn
  - id: librispeech
    lang: en
    download:
      source_dataset: librispeech
      files: all
      dedup_key: openslr:slr12:librispeech
  - id: gigaspeech
    lang: en
    subset: XL
    download:
      source_dataset: gigaspeech
      hf_include:
        - "(?i)(XL|GigaSpeech\\.json|metadata)"
      dedup_key: hf:speechcolab/gigaspeech:xl
  - id: commonvoice-en
    enabled: false
    lang: en
    provider: voxbox
    download:
      source_dataset: voxbox
      hf_include:
        - "(?i)(commonvoice|common_voice|cv).*(en|english)"
      dedup_key: voxbox:commonvoice:en
      fallback:
        source_dataset: commonvoice-en
  - id: emilia-en
    enabled: false
    lang: en
    provider: voxbox
    download:
      source_dataset: voxbox
      hf_include:
        - "(?i)(emilia).*(en|english)"
      dedup_key: voxbox:emilia:en
      fallback:
        source_dataset: emilia-en
