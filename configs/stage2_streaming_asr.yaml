seed: 1337
device: cpu
output_dir: outputs/stage2_smoke
stage1_checkpoint:

audio:
  target_sample_rate: 16000
  chunk_seconds: 0.16
  lookback_seconds: 0.96
  lookahead_seconds: 0.04

tokenizer:
  backend: dummy
  vocab_size: 256
  token_rate_hz: 12.5

model:
  backend: dummy
  hidden_size: 128
  model_name_or_path: Qwen/Qwen3-0.6B

data:
  train_manifest: manifests/stage2/train.jsonl
  dev_manifest: manifests/stage2/dev.jsonl
  limit_train_samples: 128
  limit_dev_samples: 16
  max_sequence_length: 2048

training:
  batch_size: 2
  eval_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.0003
  weight_decay: 0.01
  max_steps: 10
  log_every: 1
  eval_every: 5
  save_every: 10

